name: Stale Issues and PRs

on:
  schedule:
    - cron: '30 2 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest

    steps:
      - name: Process stale issues and PRs
        uses: actions/stale@v9
        with:
          days-before-issue-stale: 30
          days-before-issue-close: 10
          days-before-pr-stale: 30
          days-before-pr-close: 10
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: |
            This issue has been automatically marked as stale due to inactivity.
            It will be closed soon if no further activity occurs.
          stale-pr-message: |
            This pull request has been automatically marked as stale due to inactivity.
            It will be closed soon if no further activity occurs.
          close-issue-message: |
            Closing this issue due to prolonged inactivity.
            Feel free to reopen if this is still relevant.
          close-pr-message: |
            Closing this pull request due to prolonged inactivity.
            Feel free to reopen when ready.
