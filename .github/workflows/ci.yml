name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: debate_user
          POSTGRES_PASSWORD: debate_pass
          POSTGRES_DB: debate_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: api/pnpm-lock.yaml
      
      - name: Install dependencies
        working-directory: ./api
        run: pnpm install
      
      - name: Generate Prisma Client
        working-directory: ./api
        run: pnpm prisma:generate
        env:
          DATABASE_URL: postgresql://debate_user:debate_pass@localhost:5432/debate_db?schema=public
      
      - name: Run Prisma migrations
        working-directory: ./api
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://debate_user:debate_pass@localhost:5432/debate_db?schema=public
      
      - name: Lint API
        working-directory: ./api
        run: pnpm lint
      
      - name: Build API
        working-directory: ./api
        run: pnpm build
      
      - name: Test API
        working-directory: ./api
        run: pnpm test
        env:
          DATABASE_URL: postgresql://debate_user:debate_pass@localhost:5432/debate_db?schema=public
          JWT_SECRET: test-jwt-secret
          REFRESH_TOKEN_SECRET: test-refresh-secret

  web-tests:
    name: Web Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml
      
      - name: Install dependencies
        working-directory: ./web
        run: pnpm install
      
      - name: Lint
        working-directory: ./web
        run: pnpm lint
      
      - name: Build Web
        working-directory: ./web
        run: pnpm build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker images
        run: docker-compose build
