version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: debate-postgres
    environment:
      POSTGRES_USER: debate_user
      POSTGRES_PASSWORD: debate_pass
      POSTGRES_DB: debate_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - debate-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debate_user -d debate_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: debate-api
    environment:
      DATABASE_URL: postgresql://debate_user:debate_pass@postgres:5432/debate_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - debate-network
    volumes:
      - ./api:/app
      - /app/node_modules

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: debate-web
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - debate-network
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  debate-network:
    driver: bridge
