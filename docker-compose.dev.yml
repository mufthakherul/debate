services:
  api:
    volumes:
      - ./api:/app:delegated
      - /app/node_modules
    command: npm run dev
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://debate_user:debate_pass@postgres:5432/debate_db?schema=public}
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-test-refresh-secret}
      PORT: ${API_PORT:-8000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    volumes:
      - ./web:/app:delegated
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
